name: Go CI

on:
  pull_request

jobs:
  tests-amd64:
    runs-on: self-hosted
    timeout-minutes: 10
    if: github.event.pull_request.head.ref == 'hw_amd64'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure branch is up-to-date with main
        run: |
          set -e
          git fetch origin
          BRANCH="${GITHUB_HEAD_REF:-$(git rev-parse --abbrev-ref HEAD)}"
          if git log origin/main ^origin/"$BRANCH" --oneline | grep .; then
            echo "Some commits from origin/main are missing in origin/$BRANCH"
            exit 1
          else
            echo "All commits from origin/main are included in origin/$BRANCH"
          fi
      - name: Check for YAML and Test changes
        run: |
          CHANGES=$(git diff --minimal --name-only origin/main...@ | grep -E '(pull_request_template\.md|\.golangci\.yaml|ci\.yaml|integration_test\.go|update\.go|metadata\.json|Taskfile\.yml)$' | wc -l)
          if [ "$CHANGES" -ne 0 ]; then
            echo "Changes detected in YAML or Test files: $CHANGES files changed."
            exit 1
          else
            echo "No changes in YAML or Test Go files."
          fi
      - name: Check description
        run: |
          shopt -s extglob
          hours=$(echo "${{ github.event.pull_request.body }}" | sed -n 3p | tr -d '[:space:]')
          if [[ "$hours" == +([[:digit:]]) ]]; then
            echo "Hours: $hours"
          else
            echo "Please include the number of hours spent in the pull request description."
            echo "Ensure the third line of the PR description contains exactly one numerical value."
            echo "After correcting the issue, please push your changes to the branch."
            exit 1
          fi
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: v1.25.0
          cache-dependency-path: go.sum
          cache: true
      - name: Setup task
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
      - name: Generate code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          task force-update
      - name: Dependencies
        working-directory: ./
        run: go mod tidy
      - name: Run linter
        run: |
          task lint
      - name: Run tests
        run: |
          task test

  tests-arm64:
    runs-on: self-hosted
    timeout-minutes: 15
    if: github.event.pull_request.head.ref == 'hw_arm64'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure branch is up-to-date with main
        run: |
          set -e
          git fetch origin
          BRANCH="${GITHUB_HEAD_REF:-$(git rev-parse --abbrev-ref HEAD)}"
          if git log origin/main ^origin/"$BRANCH" --oneline | grep .; then
            echo "Some commits from origin/main are missing in origin/$BRANCH"
            exit 1
          else
            echo "All commits from origin/main are included in origin/$BRANCH"
          fi
      - name: Check for YAML and Test changes
        run: |
          CHANGES=$(git diff --minimal --name-only origin/main...@ | grep -E '(pull_request_template\.md|\.golangci\.yaml|ci\.yaml|integration_test\.go|update\.go|metadata\.json|Taskfile\.yml)$' | wc -l)
          if [ "$CHANGES" -ne 0 ]; then
            echo "Changes detected in YAML or Test files: $CHANGES files changed."
            exit 1
          else
            echo "No changes in YAML or Test Go files."
          fi
      - name: Check description
        run: |
          shopt -s extglob
          hours=$(echo "${{ github.event.pull_request.body }}" | sed -n 3p | tr -d '[:space:]')
          if [[ "$hours" == +([[:digit:]]) ]]; then
            echo "Hours: $hours"
          else
            echo "Please include the number of hours spent in the pull request description."
            echo "Ensure the third line of the PR description contains exactly one numerical value."
            echo "After correcting the issue, please push your changes to the branch."
            exit 1
          fi
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: v1.25.0
          cache-dependency-path: go.sum
          cache: true
      - name: Setup task
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
      - name: Generate code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          task force-update
      - name: Dependencies
        working-directory: ./
        run: go mod tidy
      - name: Run linter
        run: |
          task lint
      - name: Enable QEMU for ARM64
        uses: docker/setup-qemu-action@v3
      - name: Generate unique names
        run: |
          UNIQUE_ID=$(echo "${GITHUB_RUN_ID}_$(openssl rand -hex 6)" | sha256sum | cut -c1-12)
          echo "TEST_CONTAINER=test_container_$UNIQUE_ID" >> $GITHUB_ENV            
          echo "Generated TEST_CONTAINER: test_container_$UNIQUE_ID"
      - name: Run tests inside ARM64 container
        run: |
          docker create --platform linux/arm64 --name $TEST_CONTAINER \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            golang:1.25-bookworm \
            bash -lc "sleep infinity"
          
          docker cp "${{ github.workspace }}/." $TEST_CONTAINER:/src
          docker start $TEST_CONTAINER
          
          docker exec $TEST_CONTAINER bash -lc '
            set -euo pipefail
            cd /src
          
            export PATH=/usr/local/go/bin:$PATH
            go test -v ./...
          '
      - name: Cleanup
        if: always()
        run: |
          docker rm -f $TEST_CONTAINER || true

  tests-summary:
    runs-on: ubuntu-latest
    needs: [tests-amd64, tests-arm64]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "${{ needs.tests-amd64.result }}"
          echo "${{ needs.tests-arm64.result }}"
          
          if [[ "${{ needs.tests-amd64.result }}" == "success" || "${{ needs.tests-arm64.result }}" == "success" ]]; then
            echo "At least one test job passed"
            exit 0
          else
            echo "Both test jobs failed"
            exit 1
          fi
